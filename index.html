<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>A+ Bar Guide Interactive Map</title>
<meta name="description" content="Every bar reviewed by A+ Bar Guide, mapped. Filter by grade, city and country." />
<meta name="apple-mobile-web-app-title" content="A+ Bar Guide Interactive Map" />
<meta property="og:title" content="A+ Bar Guide Interactive Map" />
<meta property="og:description" content="Every bar reviewed by A+ Bar Guide, mapped. Filter by grade, city and country." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://aplusbarguide.github.io/Interactive-Map/" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="A+ Bar Guide Interactive Map" />
<meta name="twitter:description" content="Every bar reviewed by A+ Bar Guide, mapped. Filter by grade, city and country." />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root{
    --gA1:#d4af37; --gA:#2e9e4f; --gAm:#7cc46a; --gB1:#1f7ae0; --gB:#4aa3f0;
    --gBm:#9fc8f5; --gC1:#f08a24; --gC:#e8601c; --gCm:#d23b3b; --gNP:#9aa0a6;
    --bg:#0f1115; --panel:#171a21; --panel2:#1f242e; --txt:#e9ecf1; --muted:#9aa3b2;
    --line:#2a313d; --accent:#d4af37;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  #map{position:absolute;inset:0;z-index:1;background:#0b0d10}

  /* Header */
  .topbar{position:absolute;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:10px;
    padding:10px 14px;background:linear-gradient(180deg,rgba(15,17,21,.96),rgba(15,17,21,.78) 70%,rgba(15,17,21,0));pointer-events:none}
  .brand{pointer-events:auto;display:flex;align-items:center;gap:10px}
  .brand .mark{width:40px;height:40px;border-radius:50%;display:block;object-fit:cover;
    box-shadow:0 2px 10px rgba(0,0,0,.45);background:#15101f;border:1px solid rgba(255,255,255,.14)}
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand a{color:var(--muted);text-decoration:none;font-size:12px}
  .brand a:hover{color:var(--accent)}
  .count{pointer-events:auto;margin-left:auto;font-size:13px;font-weight:600;color:var(--txt);
    background:rgba(212,175,55,.12);border:1.5px solid var(--accent);padding:8px 16px;border-radius:24px;
    box-shadow:0 2px 14px rgba(0,0,0,.4);display:flex;align-items:baseline;gap:6px}
  .count b{color:var(--accent);font-size:20px;font-weight:800;line-height:1}

  /* Filter toggle (mobile) */
  .fbtn{pointer-events:auto;display:none;align-items:center;gap:6px;background:var(--accent);color:#1a1300;
    border:none;font-weight:700;padding:8px 12px;border-radius:20px;cursor:pointer;font-size:13px}

  /* Panel */
  .panel{position:absolute;z-index:1000;top:60px;left:14px;width:300px;max-height:calc(100% - 80px);overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .panel h2{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:0 0 8px}
  .sec{margin-bottom:16px}
  .search{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);font-size:14px;outline:none}
  .search:focus{border-color:var(--accent)}
  .searchwrap{position:relative}
  .ac{position:absolute;top:100%;left:0;right:0;margin-top:5px;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;max-height:260px;overflow:auto;z-index:30;display:none;box-shadow:0 10px 30px rgba(0,0,0,.55)}
  .ac-item{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;border-bottom:1px solid var(--line)}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover{background:rgba(212,175,55,.14)}
  .ac .dot{width:10px;height:10px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.3)}
  .ac .acn{font-weight:600;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac .acc{color:var(--muted);font-size:11px;flex:none}
  select{width:100%;padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);font-size:13px;outline:none;margin-top:6px}
  select:focus{border-color:var(--accent)}
  .grades{display:flex;flex-wrap:wrap;gap:6px}
  .gchip{cursor:pointer;user-select:none;font-size:12px;font-weight:700;padding:5px 9px;border-radius:8px;
    border:1.5px solid transparent;color:#0b0d10;opacity:.32;transition:opacity .12s,transform .05s}
  .gchip.on{opacity:1}
  .gchip:active{transform:scale(.94)}
  .frow{display:flex;gap:8px}
  .frow button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    padding:7px;border-radius:9px;font-size:12px;cursor:pointer}
  .frow button:hover{color:var(--txt);border-color:var(--accent)}
  .legend{font-size:11px;color:var(--muted);line-height:1.6}

  /* Markers */
  .pin{border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .pin span{transform:rotate(45deg);font-weight:800;color:#0b0d10;font-size:11px;line-height:1}

  /* Popup */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--txt);border-radius:14px;border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:14px 16px;width:248px !important}
  .pp .name{font-size:17px;font-weight:800;margin:0 0 2px;line-height:1.2}
  .pp .loc{font-size:12px;color:var(--muted);margin-bottom:10px}
  .pp .gbadge{display:inline-block;font-weight:800;font-size:13px;color:#0b0d10;padding:3px 10px;border-radius:7px;margin-bottom:10px}
  .pp .scores{display:flex;gap:6px;margin-bottom:10px}
  .pp .sc{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:6px 2px}
  .pp .sc b{display:block;font-size:15px}
  .pp .sc small{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .pp .rec{font-size:12.5px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);
    border-radius:9px;padding:8px 10px;margin-bottom:10px;line-height:1.4}
  .pp .rec b{color:var(--accent)}
  .pp .note{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px;text-align:center}
  .pp .ig{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;text-decoration:none;
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;font-weight:700;
    font-size:13px;padding:9px;border-radius:10px}
  .pp .ig:active{opacity:.85}
  .leaflet-container a.leaflet-popup-close-button{color:var(--muted)}
  .pp .report{display:flex;gap:6px;margin-top:8px}
  .pp .report button{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    font-size:11px;padding:7px 4px;border-radius:8px;cursor:pointer}
  .pp .report button:hover{color:var(--txt);border-color:var(--accent)}
  /* report modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;width:340px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .modal h3{margin:0 0 10px;font-size:16px}
  .modal .mtxt{font-size:13px;color:var(--muted);margin:0 0 12px}
  .modal .mtxt b{color:var(--txt)}
  .modal textarea{width:100%;min-height:70px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px;font-size:13px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box}
  .modal textarea:focus{border-color:var(--accent)}
  .mbtns{display:flex;gap:8px;margin-top:12px}
  .mbtns button{flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);font-size:13px;cursor:pointer;font-weight:600}
  .mcancel{background:var(--panel2);color:var(--muted)}
  .msend{background:var(--accent);color:#1a1300;border-color:var(--accent)}
  .locbar{position:fixed;bottom:0;left:0;right:0;z-index:1500;background:var(--panel);border-top:1.5px solid var(--accent);padding:12px 14px;display:none;align-items:center;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.5)}
  .locbar.open{display:flex}
  .locbar .lt{flex:1;font-size:13px}
  .locbar .lt b{color:var(--accent)}
  .locbar button{padding:8px 14px;border-radius:9px;border:1px solid var(--line);font-size:13px;cursor:pointer;font-weight:600}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#1a1300;font-weight:700;padding:10px 18px;border-radius:24px;z-index:3000;box-shadow:0 6px 24px rgba(0,0,0,.5);display:none}
  .toast.open{display:block}

  @media (max-width:640px){
    .panel{top:auto;bottom:0;left:0;right:0;width:auto;border-radius:18px 18px 0 0;max-height:62%;
      transform:translateY(100%);transition:transform .25s ease}
    .panel.open{transform:translateY(0)}
    .fbtn{display:flex}
    .brand h1{font-size:14px}
    .count{display:none}
  }
  .credit{position:absolute;bottom:6px;right:8px;z-index:1000;font-size:10px;color:#6b7682;opacity:.85}
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const GRADES=["A+","A","A-","B+","B","B-","C+","C","C-","NP"];
const GCOLOR={"A+":"var(--gA1)","A":"var(--gA)","A-":"var(--gAm)","B+":"var(--gB1)","B":"var(--gB)",
  "B-":"var(--gBm)","C+":"var(--gC1)","C":"var(--gC)","C-":"var(--gCm)","NP":"var(--gNP)"};
const GHEX={"A+":"#d4af37","A":"#2e9e4f","A-":"#7cc46a","B+":"#1f7ae0","B":"#4aa3f0",
  "B-":"#9fc8f5","C+":"#f08a24","C":"#e8601c","C-":"#d23b3b","NP":"#9aa0a6"};
const IG_FALLBACK="https://instagram.com/aplus_barguide";

const map=L.map("map",{zoomControl:true,worldCopyJump:true}).setView([25,30],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:"abcd",maxZoom:19}).addTo(map);

const cluster=L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
  iconCreateFunction:c=>{const n=c.getChildCount();const s=n<10?34:n<50?40:46;
    return L.divIcon({html:`<div style="background:rgba(212,175,55,.92);color:#1a1300;width:${s}px;height:${s}px;
      border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;
      border:2px solid #1a1300;box-shadow:0 2px 8px rgba(0,0,0,.5)">${n}</div>`,
      className:"",iconSize:[s,s]});}});
map.addLayer(cluster);

const state={q:"",grades:new Set(GRADES),country:"",city:""};
let BARS=[],MARKERS=[];

function pinIcon(g){const c=GHEX[g]||"#9aa0a6";
  return L.divIcon({className:"",iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-24],
    html:`<div class="pin" style="width:24px;height:24px;background:${c}"><span>${g==="NP"?"·":g}</span></div>`});}

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function popupHtml(b){
  if(b.draft){
    return `<div class="pp">
      <div class="name">${esc(b.bar)}${b.alt?` / ${esc(b.alt)}`:""}</div>
      <div class="loc">${esc(b.city)}, ${esc(b.country)}</div>
      <span class="gbadge" style="background:${GHEX["NP"]}">Grade: In Progress</span>
      <div class="rec" style="background:rgba(255,255,255,.05);border-color:var(--line)">Atmosphere, Drinks &amp; Service: <b>In Progress</b></div>
      ${b.geo==="exact"?"":(b.country==="China"
        ? `<div class="note">📍 No exact location available — use DaZhongDianPing (<a href="https://www.dianping.com/" target="_blank" rel="noopener" style="color:var(--accent)">大众点评</a>) to find location</div>`
        : `<div class="note">📍 Approximate location${b.geo==="district"?" — district center":""}; exact spot not available</div>`)}
      <div class="ig" style="background:var(--panel2);color:var(--muted);cursor:default">◎ Review In Progress</div>
    </div>`;
  }
  const hasIg=b.ig&&b.ig.trim();
  const ig=hasIg?b.ig.trim():IG_FALLBACK;
  const igLabel=hasIg?"Read full review":"Visit A+ Bar Guide";
  const note=hasIg?"":`<div class="note">No official review posted yet</div>`;
  const rec=b.rec?`<div class="rec"><b>Recommendation:</b> ${esc(b.rec)}</div>`:"";
  return `<div class="pp">
    <div class="name">${esc(b.bar)}${b.alt?` / ${esc(b.alt)}`:""}</div>
    <div class="loc">${esc(b.city)}, ${esc(b.country)}</div>
    <span class="gbadge" style="background:${GHEX[b.grade]}">${b.grade==="NP"?"No post":b.grade} · ${b.total}/30</span>
    <div class="scores">
      <div class="sc"><b>${b.atm}</b><small>Atmos</small></div>
      <div class="sc"><b>${b.drk}</b><small>Drinks</small></div>
      <div class="sc"><b>${b.svc}</b><small>Service</small></div>
    </div>
    ${rec}
    ${note}
    ${b.geo==="exact"?"":(b.country==="China"
      ? `<div class="note">📍 No exact location available — use DaZhongDianPing (<a href="https://www.dianping.com/" target="_blank" rel="noopener" style="color:var(--accent)">大众点评</a>) to find location</div>`
      : `<div class="note">📍 Approximate location${b.geo==="district"?" — district center":""}; exact spot not available</div>`)}
    <a class="ig" href="${esc(ig)}" target="_blank" rel="noopener">◎ ${igLabel}</a>
    <div class="report">
      <button onclick="window.reportClosed(${b._id})">⚐ Report permanently closed</button>
    </div>
  </div>`;}

function build(){
  MARKERS=BARS.filter(b=>isFinite(b.lat)&&isFinite(b.lon)).map(b=>{const m=L.marker([b.lat,b.lon],{icon:pinIcon(b.grade)});
    m.bindPopup(popupHtml(b),{closeButton:true});m._bar=b;return m;});
}

function apply(){
  const q=state.q.toLowerCase();
  cluster.clearLayers();let shown=0;const add=[];
  for(const m of MARKERS){const b=m._bar;
    if(!state.grades.has(b.grade))continue;
    if(state.country&&b.country!==state.country)continue;
    if(state.city&&b.city!==state.city)continue;
    if(q&&!b.bar.toLowerCase().includes(q))continue;
    add.push(m);shown++;}
  cluster.addLayers(add);
  document.getElementById("cnt").textContent=shown;
}

function syncGradeChips(){
  document.querySelectorAll(".gchip").forEach(el=>el.classList.toggle("on",state.grades.has(el.dataset.g)));
}
function zoomToFiltered(){
  const b=cluster.getBounds();
  if(b && b.isValid()) map.fitBounds(b.pad(0.25),{maxZoom:15});
}

function buildControls(){
  // grade chips
  const gc=document.getElementById("grades");
  const present=new Set(BARS.map(b=>b.grade));   // only show grade chips that actually have bars
  GRADES.filter(g=>present.has(g)).forEach(g=>{const el=document.createElement("div");
    el.className="gchip on";el.dataset.g=g;el.textContent=(g==="NP"?"Unranked":g);el.style.background=GHEX[g];
    el.onclick=()=>{
      if(state.grades.size===GRADES.length){ state.grades=new Set([g]); }   // first click: isolate this grade
      else if(state.grades.has(g)){ state.grades.delete(g); if(state.grades.size===0) state.grades=new Set(GRADES); } // un-clicking the last one resets to all
      else { state.grades.add(g); }
      syncGradeChips(); apply();
    };
    gc.appendChild(el);});
  // country/city
  const countries=[...new Set(BARS.map(b=>b.country))].sort();
  const csel=document.getElementById("country");
  countries.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;csel.appendChild(o);});
  const citysel=document.getElementById("city");
  function fillCities(){citysel.innerHTML='<option value="">All cities</option>';
    const cities=[...new Set(BARS.filter(b=>!state.country||b.country===state.country).map(b=>b.city))].sort();
    cities.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;citysel.appendChild(o);});}
  fillCities();
  csel.onchange=()=>{state.country=csel.value;state.city="";fillCities();apply();zoomToFiltered();};
  citysel.onchange=()=>{state.city=citysel.value;apply();zoomToFiltered();};
  const acEl=document.getElementById("ac");
  function hideAC(){acEl.style.display="none";acEl.innerHTML="";}
  function renderSuggest(q){
    if(!q || q.length<1){hideAC();return;}
    const ql=q.toLowerCase();
    const matches=MARKERS.filter(m=>m._bar.bar.toLowerCase().includes(ql)).slice(0,8);
    if(!matches.length){hideAC();return;}
    acEl.innerHTML=matches.map((m,i)=>{const b=m._bar;
      return `<div class="ac-item" data-i="${i}"><span class="dot" style="background:${GHEX[b.grade]}"></span>`+
             `<span class="acn">${esc(b.bar)}</span><span class="acc">${esc(b.city)} · ${b.draft?"In Progress":(b.grade==="NP"?"Unranked":b.grade)}</span></div>`;}).join("");
    acEl.style.display="block";
    [...acEl.children].forEach((el,i)=>el.onclick=()=>selectBar(matches[i]));
  }
  function selectBar(m){
    const b=m._bar;
    state.q=b.bar; state.country=""; state.city=""; state.grades=new Set(GRADES);
    document.getElementById("q").value=b.bar; csel.value=""; fillCities(); syncGradeChips();
    apply(); hideAC(); document.getElementById("panel").classList.remove("open");
    cluster.zoomToShowLayer(m,()=>{ map.setView(m.getLatLng(),16,{animate:true}); m.openPopup(); });
  }
  document.getElementById("q").oninput=e=>{state.q=e.target.value;apply();renderSuggest(e.target.value);};
  document.addEventListener("click",e=>{ if(!e.target.closest(".searchwrap")) hideAC(); });
  document.getElementById("reset").onclick=()=>{
    state.q="";state.country="";state.city="";state.grades=new Set(GRADES);
    document.getElementById("q").value="";csel.value="";fillCities();
    document.querySelectorAll(".gchip").forEach(el=>el.classList.add("on"));apply();};
  document.getElementById("fit").onclick=()=>{if(cluster.getLayers().length)map.fitBounds(cluster.getBounds().pad(.1));};
  // legend
  document.getElementById("legend").innerHTML="<b>Grades:</b> "+GRADES.map(g=>
    `<span style="color:${GHEX[g]}">●</span> ${g==="NP"?"Unranked":g}`).join("  ");
  // mobile toggle
  document.getElementById("fbtn").onclick=()=>document.getElementById("panel").classList.toggle("open");
}

// ---- Crowd reports (Formspree) ----
const FORMSPREE="https://formspree.io/f/xykqgwzv";
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("open");setTimeout(()=>t.classList.remove("open"),2800);}
function sendReport(payload){return fetch(FORMSPREE,{method:"POST",headers:{"Accept":"application/json","Content-Type":"application/json"},body:JSON.stringify(payload)}).then(r=>{if(!r.ok)throw 0;});}
function closeModal(){document.getElementById("modalbg").classList.remove("open");}
window.__closeModal=closeModal;
document.getElementById("modalbg").addEventListener("click",e=>{if(e.target.id==="modalbg")closeModal();});

window.reportClosed=function(id){
  const b=BARS[id];
  document.getElementById("modal").innerHTML=
    `<h3>Report permanently closed</h3>
     <p class="mtxt"><b>${esc(b.bar)}</b> · ${esc(b.city)}, ${esc(b.country)}</p>
     <textarea id="mnote" placeholder="How do you know? (optional)"></textarea>
     <input type="text" id="mhp" style="position:absolute;left:-9999px" tabindex="-1" autocomplete="off" aria-hidden="true">
     <div class="mbtns"><button class="mcancel" onclick="window.__closeModal()">Cancel</button><button class="msend" id="msend">Send report</button></div>`;
  document.getElementById("modalbg").classList.add("open");
  document.getElementById("msend").onclick=function(){
    if(document.getElementById("mhp").value){closeModal();return;}
    const btn=this; btn.textContent="Sending…"; btn.disabled=true;
    sendReport({_subject:`CLOSED report: ${b.bar} (${b.city})`,report_type:"PERMANENTLY CLOSED",bar:b.bar,city:b.city,country:b.country,grade:b.grade,note:document.getElementById("mnote").value})
      .then(()=>{closeModal();toast("Thanks — report sent ✓");})
      .catch(()=>{btn.textContent="Try again";btn.disabled=false;});
  };
};

function endLoc(){ if(window.__loc){map.removeLayer(window.__loc.marker);window.__loc=null;} document.getElementById("locbar").classList.remove("open"); }
window.suggestLocation=function(id){
  const b=BARS[id]; map.closePopup();
  if(window.__loc){map.removeLayer(window.__loc.marker);}
  const mk=L.marker([b.lat,b.lon],{draggable:true,zIndexOffset:1000,icon:pinIcon(b.grade)}).addTo(map);
  map.setView([b.lat,b.lon],Math.max(map.getZoom(),15),{animate:true});
  window.__loc={marker:mk,id};
  document.getElementById("loctext").innerHTML=`Drag the pin for <b>${esc(b.bar)}</b> to its correct spot, then Submit.`;
  document.getElementById("locbar").classList.add("open");
};
document.getElementById("loccancel").onclick=endLoc;
document.getElementById("locsubmit").onclick=function(){
  if(!window.__loc)return; const b=BARS[window.__loc.id]; const ll=window.__loc.marker.getLatLng();
  const btn=this; btn.textContent="Sending…"; btn.disabled=true;
  sendReport({_subject:`LOCATION fix: ${b.bar} (${b.city})`,report_type:"LOCATION CORRECTION",bar:b.bar,city:b.city,country:b.country,old_coords:`${b.lat}, ${b.lon}`,proposed_coords:`${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`,google_maps:`https://www.google.com/maps?q=${ll.lat},${ll.lng}`})
    .then(()=>{btn.textContent="Submit location";btn.disabled=false;endLoc();toast("Thanks — location sent ✓");})
    .catch(()=>{btn.textContent="Try again";btn.disabled=false;});
};

fetch("bars.json").then(r=>r.json()).then(data=>{
  BARS=data;BARS.forEach((b,i)=>b._id=i);build();buildControls();apply();
  if(cluster.getLayers().length)map.fitBounds(cluster.getBounds().pad(.1));
}).catch(e=>{document.getElementById("cnt").textContent="error loading data";console.error(e);});
</script>
